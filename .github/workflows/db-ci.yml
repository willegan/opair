name: Database Migration CI

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migration-lint:
    name: SQL Syntax Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Create Supabase roles
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres <<'SQL'
            DO $$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'authenticated') THEN
                CREATE ROLE authenticated NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'service_role') THEN
                CREATE ROLE service_role NOLOGIN BYPASSRLS;
              END IF;
            END $$;
          SQL

      - name: Validate SQL syntax (apply migrations to Postgres)
        env:
          PGPASSWORD: postgres
        run: |
          echo "Applying all migration files to validate SQL syntax..."
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "  Applying: $f"
            psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied successfully — SQL syntax valid."

  migration-test:
    name: RLS Policy Tests (Local Supabase)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Create Supabase roles
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres <<'SQL'
            DO $$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'anon') THEN
                CREATE ROLE anon NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'authenticated') THEN
                CREATE ROLE authenticated NOLOGIN;
              END IF;
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'service_role') THEN
                CREATE ROLE service_role NOLOGIN BYPASSRLS;
              END IF;
            END $$;
          SQL

      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying: $f"
            psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run schema and policy tests
        env:
          PGPASSWORD: postgres
        run: |
          if ls supabase/tests/*.sql 1>/dev/null 2>&1; then
            for f in $(ls supabase/tests/*.sql | sort); do
              echo "Running test: $f"
              psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
            done
          else
            echo "No test files found in supabase/tests/ — skipping."
          fi
